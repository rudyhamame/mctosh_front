<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0d0d1a" />
    <meta name="description" content="AMCTOSHS | CVS" />
    <title>AMCTOSHS | CVS</title>
    <link rel="icon" type="image/png" href="%BASE_URL%img/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- The @flaticon/flaticon-uicons npm package (imported in main.jsx,
         bundled locally by Vite) already provides both uicons-regular-rounded
         and uicons-bold-rounded — these CDN links duplicated that exact same
         icon font from a second source. Two competing @font-face
         registrations for the same font-family, one local and one remote,
         is a known trigger for WebKit/Safari's font-swap repaint bug: the
         glyph paints blank and never gets repainted until something else
         (a tap) forces a reflow — reported as "icons aren't visible until
         you click them" on iPad Safari. Removed in favor of the single
         locally-bundled copy. -->
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
